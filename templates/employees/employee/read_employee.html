{% extends 'base.html' %}
{% block content %}
<h3>Employee Details</h3>
<p><strong>Name:</strong> {{ employee.name }} {{ employee.last_name }}</p>
<p><strong>Email:</strong> {{ employee.email }}</p>
<p><strong>Salary:</strong> {{ employee.salary }}</p>
<a href="{% url 'employee_list' %}">Back to list</a>
<a href="{% url 'update_employee' employee.pk %}">Edit</a>
<a href="{% url 'delete_employee' employee.pk %}">Delete</a>
{% endblock %}
