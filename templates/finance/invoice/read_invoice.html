{% extends 'base.html' %}
{% block content %}
<h3>Invoice Details</h3>
<p><strong>Invoice ID:</strong> {{ invoice.pk }}</p>
<p><strong>Total Amount:</strong> {{ invoice.total_amount }}</p>
<p><strong>Status:</strong> {{ invoice.status }}</p>
<a href="{% url 'invoice_list' %}">Back to list</a>
<a href="{% url 'update_invoice' invoice.pk %}">Edit</a>
<a href="{% url 'delete_invoice' invoice.pk %}">Delete</a>
{% endblock %}
