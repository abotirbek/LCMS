{% extends 'base.html' %}
{% block content %}
<h3>Payment List</h3>
<a href="{% url 'create_payment' %}">Create Payment</a>
<ul>
  {% for payment in payments %}
  <li>
    <a href="{% url 'read_payment' payment.pk %}">Payment #{{ payment.pk }}</a>
    <a href="{% url 'update_payment' payment.pk %}">Edit</a>
    <a href="{% url 'delete_payment' payment.pk %}">Delete</a>
  </li>
  {% empty %}
  <li>No payments found.</li>
  {% endfor %}
</ul>
{% endblock %}
