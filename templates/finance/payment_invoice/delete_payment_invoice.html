{% extends 'base.html' %}
{% block content %}
<h3>Delete Payment Invoice</h3>
<form method="post">
  {% csrf_token %}
  <p>Are you sure you want to delete payment invoice #{{ payment_invoice.pk }}?</p>
  <button type="submit">Delete</button>
  <a href="{% url 'payment_invoice_list' %}">Cancel</a>
</form>
{% endblock %}
