{% extends "base.html" %}

{% block content %}

<style>
    .form-container {
        max-width: 500px;
        margin: 40px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
    }

    .form-container h2 {
        margin-bottom: 20px;
        color: #333;
    }

    .form-container p {
        margin-bottom: 15px;
    }

    .form-container label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    .form-container input,
    .form-container textarea,
    .form-container select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 15px;
    }

    .form-container button {
        padding: 8px 16px;
        border: none;
        background: #333;
        color: white;
        border-radius: 4px;
        cursor: pointer;
    }

    .form-container button:hover {
        background: #555;
    }
</style>

<div class="form-container">
    <h2>Edit Profile</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Save Changes</button>
    </form>
</div>

{% endblock %}
