{% extends "base.html" %}

{% block content %}

<style>
    .profile-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
    }

    .profile-container h2 {
        margin-bottom: 20px;
        color: #333;
    }

    .profile {
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
    }

    .profile-item {
        display: flex;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid #eee;
    }

    .profile-item:last-child {
        border-bottom: none;
    }

    .profile-item strong {
        color: #333;
    }

    .profile-item span {
        color: #555;
    }

    .edit-btn {
        display: inline-block;
        margin-top: 20px;
        padding: 8px 16px;
        background: #333;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
    }

    .edit-btn:hover {
        background: #555;
    }

    .back-btn {
        display: inline-block;
        margin-top: 20px;
        padding: 8px 16px;
        background: red;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
    }

    .back-btn:hover {
        background: #666;
    }
</style>

<div class="profile-container">
    <h2>My Profile</h2>

    <div class="profile">

        <div class="profile-item">
            <strong>Username</strong>
            <span>{{ profile.user.username }}</span>
        </div>

        <div class="profile-item">
            <strong>Phone</strong>
            <span>{{ profile.user.phone }}</span>
        </div>

        <div class="profile-item">
            <strong>Email</strong>
            <span>{{ profile.user.email }}</span>
        </div>

        <div class="profile-item">
            <strong>Birth Date</strong>
            <span>{{ profile.birth_date }}</span>
        </div>

        <div class="profile-item">
            <strong>Bio</strong>
            <span>{{ profile.bio }}</span>
        </div>

    </div>

    <a href="{% url 'edit_profile' %}" class="edit-btn">Edit Profile</a>
    <a href="{% url 'product_list' %}" class="back-btn">Back</a>
</div>

{% endblock %}
