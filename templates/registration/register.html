{% extends 'base.html' %}
{% block content %}

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
    }

    .register-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 90vh;
        background: linear-gradient(135deg, #c2ffd8, #465efb);
        padding: 20px;
    }

    .register-card {
        width: 430px;
        background: #fff;
        padding: 40px;
        border-radius: 18px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.18);
        transition: transform .3s ease;
    }

    .register-card:hover {
        transform: translateY(-4px);
    }

    .register-card h2 {
        text-align: center;
        margin-bottom: 8px;
        color: #222;
    }

    .subtitle {
        text-align: center;
        color: #777;
        margin-bottom: 30px;
    }

    .register-card p {
        margin-bottom: 18px;
    }

    .register-card label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #444;
    }

    .register-card input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 15px;
        transition: .25s;
    }

    .register-card input:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 3px rgba(34,197,94,.2);
        outline: none;
    }

    .register-btn {
        width: 100%;
        padding: 13px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: .3s;
    }

    .register-btn:hover {
        background: #16a34a;
    }

    .login-text {
        margin-top: 22px;
        text-align: center;
        color: #666;
    }

    .login-text a {
        color: #16a34a;
        font-weight: bold;
        text-decoration: none;
    }

    .login-text a:hover {
        text-decoration: underline;
    }

    .helptext {
        display: block;
        margin-top: 5px;
        font-size: 13px;
        color: #777;
    }

    .errorlist {
        color: #dc2626;
        list-style: none;
        padding: 0;
        margin: 5px 0 10px;
        font-size: 14px;
    }
</style>

<div class="register-container">
    <div class="register-card">
        <h2>Create Your Account</h2>
        <p class="subtitle">
            Join our community and get started today.
        </p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="register-btn">
                Create Account
            </button>
        </form>

        <p class="login-text">
            Already have an account?
            <a href="{% url 'login' %}">Sign In</a>
        </p>
    </div>
</div>

{% endblock %}
