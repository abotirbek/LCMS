{% extends 'base.html' %}
{% block content %}
<h3>Attendance List</h3>
<a href="{% url 'create_attendance' %}">Create Attendance</a>
<ul>
  {% for attendance in attendances %}
  <li>
    <a href="{% url 'read_attendance' attendance.pk %}">Attendance #{{ attendance.pk }}</a>
    <a href="{% url 'update_attendance' attendance.pk %}">Edit</a>
    <a href="{% url 'delete_attendance' attendance.pk %}">Delete</a>
  </li>
  {% empty %}
  <li>No attendance records found.</li>
  {% endfor %}
</ul>
{% endblock %}
