{% extends 'base.html' %}
{% block content %}
<h3>Enrollment Details</h3>
<p><strong>Student:</strong> {{ enrollment.student.name }}</p>
<p><strong>Group:</strong> {{ enrollment.group.title }}</p>
<p><strong>Status:</strong> {{ enrollment.status }}</p>
<a href="{% url 'enrollment_list' %}">Back to list</a>
<a href="{% url 'update_enrollment' enrollment.pk %}">Edit</a>
<a href="{% url 'delete_enrollment' enrollment.pk %}">Delete</a>
{% endblock %}
