{% extends 'base.html' %}
{% block content %}
<h3>Delete Student</h3>
<form method="post">
  {% csrf_token %}
  <p>Are you sure you want to delete "{{ student.name }} {{ student.last_name }}"?</p>
  <button type="submit">Delete</button>
  <a href="{% url 'student_list' %}">Cancel</a>
</form>
{% endblock %}
